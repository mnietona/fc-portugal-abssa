<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Portugal | Team App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { red: '#8A1538', green: '#006600', gold: '#D4AF37', dark: '#0f0f0f', card: '#171717' }
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 3px solid #D4AF37; color: white; }
    </style>
</head>
<body class="bg-brand-dark text-gray-200 font-sans">

    <nav class="fixed bottom-0 left-0 right-0 bg-brand-card border-t border-gray-800 z-50 px-6 py-3 flex justify-between items-center lg:top-0 lg:bottom-auto">
        <button onclick="showSection('next')" class="flex flex-col items-center text-xs gap-1 hover:text-brand-gold">
            <i class="fa-solid fa-calendar-day text-lg"></i>Match
        </button>
        <button onclick="showSection('classement')" class="flex flex-col items-center text-xs gap-1 hover:text-brand-gold">
            <i class="fa-solid fa-list-ol text-lg"></i>Classement
        </button>
        <button onclick="showSection('calendrier')" class="flex flex-col items-center text-xs gap-1 hover:text-brand-gold">
            <i class="fa-solid fa-table-list text-lg"></i>Résultats
        </button>
    </nav>

    <header class="p-6 pt-10 text-center lg:mt-16">
        <h1 class="text-3xl font-black text-white italic">FC PORTUGAL</h1>
        <p class="text-brand-gold text-xs tracking-[0.3em] uppercase">Division 1 • 2025/2026</p>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24 lg:max-w-4xl">
        
        <section id="section-next" class="space-y-4">
            <div id="next-match-card"></div>
        </section>

        <section id="section-classement" class="hidden">
            <div class="bg-brand-card rounded-xl overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-black/40 text-gray-500 uppercase text-[10px]">
                        <tr>
                            <th class="p-3 text-center">#</th>
                            <th class="p-3 text-left">Équipe</th>
                            <th class="p-3 text-center">J</th>
                            <th class="p-3 text-center text-white">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body" class="divide-y divide-gray-800"></tbody>
                </table>
            </div>
        </section>

        <section id="section-calendrier" class="hidden">
            <div class="flex items-center justify-between mb-4 bg-brand-card p-2 rounded-lg">
                <button onclick="changeDay(-1)" class="p-2"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="current-day-label" class="font-bold text-brand-gold">Journée 1</span>
                <button onclick="changeDay(1)" class="p-2"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div id="day-results" class="space-y-2"></div>
        </section>

    </main>

    <script>
        let currentDay = 1;
        let globalData = { ranking: [], calendar: {} };
        const MY_CLUB = "PORTUGAL FC";

        async function init() {
            // Chargement parallèle des deux sources de données
            const [resRanking, resCal] = await Promise.all([
                fetch('../data/abssa_data.json').then(r => r.json()),
                fetch('../data/calendrier.json').then(r => r.json())
            ]);
            
            globalData.ranking = resRanking.classement;
            globalData.calendar = resCal.journees;

            renderRanking();
            renderNextMatch();
            renderDay(1);
        }

        function showSection(id) {
            ['next', 'classement', 'calendrier'].forEach(s => {
                document.getElementById(`section-${s}`).classList.add('hidden');
            });
            document.getElementById(`section-${id}`).classList.remove('hidden');
        }

        function renderRanking() {
            const container = document.getElementById('ranking-body');
            container.innerHTML = globalData.ranking.map(team => `
                <tr class="${team.equipe.includes(MY_CLUB) ? 'bg-brand-red/20 border-l-4 border-brand-green' : ''}">
                    <td class="p-3 text-center text-gray-500">${team.position}</td>
                    <td class="p-3 font-medium">${team.equipe}</td>
                    <td class="p-3 text-center">${team.joues}</td>
                    <td class="p-3 text-center font-bold text-brand-gold text-lg">${team.points}</td>
                </tr>
            `).join('');
        }

        function renderNextMatch() {
            // On cherche le premier match "A Venir"
            let next = null;
            for(let i=1; i<=26; i++) {
                next = globalData.calendar[`Journee_${i}`].find(m => 
                    (m.equipe_domicile.includes(MY_CLUB) || m.equipe_exterieure.includes(MY_CLUB)) && m.statut === "A Venir"
                );
                if(next) break;
            }

            const container = document.getElementById('next-match-card');
            if(!next) {
                container.innerHTML = "<p class='text-center py-10'>Aucun match prévu</p>";
                return;
            }

            // On récupère les infos de l'adversaire dans le JSON ranking pour avoir le terrain/maillot
            const isDom = next.equipe_domicile.includes(MY_CLUB);
            const advName = isDom ? next.equipe_exterieure : next.equipe_domicile;
            // On nettoie le nom de l'adversaire pour chercher dans la base (enlever le chiffre)
            const advClean = advName.replace(/\s+\d+$/, "").trim();
            const advInfo = globalData.ranking.find(t => t.equipe.includes(advClean)) || {};

            container.innerHTML = `
                <div class="bg-brand-card rounded-2xl p-6 shadow-2xl border border-gray-800">
                    <div class="flex justify-between items-center mb-6 text-center">
                        <div class="w-5/12"><p class="font-bold text-white">${next.equipe_domicile}</p></div>
                        <div class="text-brand-gold font-black">VS</div>
                        <div class="w-5/12"><p class="font-bold text-white">${next.equipe_exterieure}</p></div>
                    </div>
                    
                    <div class="space-y-4 pt-4 border-t border-gray-800">
                        <div class="flex items-start gap-3">
                            <i class="fa-solid fa-shirt text-brand-gold mt-1"></i>
                            <div>
                                <p class="text-xs text-gray-500 uppercase">Couleur adverse</p>
                                <p class="text-sm text-white">${advInfo.couleur_maillot || 'Non définie'}</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3">
                            <i class="fa-solid fa-location-dot text-brand-red mt-1"></i>
                            <div>
                                <p class="text-xs text-gray-500 uppercase">Terrain</p>
                                <p class="text-sm text-white mb-2">${advInfo.terrain_nom || 'Non défini'}</p>
                                <button onclick="copyToClipboard('${advInfo.terrain_adresse}')" class="text-[10px] bg-gray-800 px-2 py-1 rounded hover:bg-brand-green">
                                    <i class="fa-solid fa-copy mr-1"></i> COPIER L'ADRESSE
                                </button>
                                <a href="https://www.google.com/maps/search/?api=1&query=${encodeAsUri(advInfo.terrain_adresse)}" target="_blank" class="text-[10px] bg-brand-green/20 text-brand-green px-2 py-1 rounded ml-2">
                                    <i class="fa-solid fa-map"></i> MAPS
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDay(dayNum) {
            currentDay = dayNum;
            document.getElementById('current-day-label').innerText = `Journée ${dayNum}`;
            const matches = globalData.calendar[`Journee_${dayNum}`];
            const container = document.getElementById('day-results');
            
            container.innerHTML = matches.map(m => `
                <div class="bg-brand-card p-3 rounded-lg flex justify-between items-center text-xs border border-gray-900">
                    <div class="w-5/12 text-right pr-2 ${m.equipe_domicile.includes(MY_CLUB) ? 'text-brand-gold font-bold' : ''}">${m.equipe_domicile}</div>
                    <div class="w-2/12 flex justify-center gap-1">
                        <span class="bg-black px-1.5 py-0.5 rounded text-white">${m.score_domicile ?? '?'}</span>
                        <span class="bg-black px-1.5 py-0.5 rounded text-white">${m.score_exterieur ?? '?'}</span>
                    </div>
                    <div class="w-5/12 text-left pl-2 ${m.equipe_exterieure.includes(MY_CLUB) ? 'text-brand-gold font-bold' : ''}">${m.equipe_exterieure}</div>
                </div>
            `).join('');
        }

        function changeDay(dir) {
            let newDay = currentDay + dir;
            if(newDay >= 1 && newDay <= 26) renderDay(newDay);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("Adresse copiée !");
        }

        function encodeAsUri(text) {
            return encodeURIComponent(text);
        }

        init();
    </script>
</body>
</html>
