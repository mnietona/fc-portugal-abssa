<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Portugal | ABSSA D1</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#8A1538',   /* Rouge profond portugais */
                            green: '#006600', /* Vert forêt */
                            gold: '#D4AF37',  /* Or pour les accents */
                            dark: '#121212',  /* Fond très sombre (élégant) */
                            card: '#1E1E1E'   /* Fond des cartes */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center">

    <!-- Container principal -->
    <div class="text-center p-8 bg-brand-card rounded-2xl shadow-2xl border-t-4 border-brand-red">
        
        <div class="flex justify-center space-x-2 mb-4">
            <div class="w-8 h-2 bg-brand-green rounded-full"></div>
            <div class="w-8 h-2 bg-brand-red rounded-full"></div>
            <div class="w-8 h-2 bg-brand-gold rounded-full"></div>
        </div>

        <h1 class="text-5xl font-bold text-white mb-2 tracking-tight">FC Portugal</h1>
        <h2 class="text-xl text-brand-gold uppercase tracking-widest font-semibold">ABSSA Division 1</h2>
        
        <p class="mt-6 text-gray-400">Le portail est en cours de construction...</p>
        
    </div>

</body>
</html>
